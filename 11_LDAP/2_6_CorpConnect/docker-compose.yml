services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5847:80"
    environment:
      LDAP_HOST: ldap
      LDAP_PORT: "389"
      LDAP_BASE_DN: dc=corpconnect,dc=local
      LDAP_PEOPLE_DN: ou=people,dc=corpconnect,dc=local
      LDAP_BIND_DN: cn=admin,dc=corpconnect,dc=local
      LDAP_BIND_PASSWORD: "CorpConnect_LDAP_Admin!"
    depends_on:
      ldap:
        condition: service_healthy
    networks:
      - corpconnect

  ldap:
    build:
      context: ./ldap
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://127.0.0.1:389", "-D", "cn=admin,dc=corpconnect,dc=local", "-w", "CorpConnect_LDAP_Admin!", "-b", "dc=corpconnect,dc=local", "-s", "base", "(objectClass=*)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - corpconnect

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    expose:
      - "80"
    depends_on:
      ldap:
        condition: service_healthy
    networks:
      - corpconnect

networks:
  corpconnect:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24