# ModSecurity v3 (libmodsecurity) + OWASP CRS 4.x
# Order per CRS INSTALL: modsecurity.conf-recommended, crs-setup, plugins, rules.
Include /etc/nginx/modsecurity/modsecurity.conf-recommended

# Recommended ships with SecRuleEngine DetectionOnly — blocking mode required for this lab.
SecRuleEngine On
SecRequestBodyAccess On
SecAuditEngine Off

# CRS 4 rules (ModSecurity v3 nginx connector does not support IncludeOptional)
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf
