services:
  web-waf:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5263:80"
    environment:
      LDAP_HOST: ldap-waf
      LDAP_PORT: "389"
      LDAP_BASE_DN: dc=corpconnect,dc=local
      LDAP_PEOPLE_DN: ou=people,dc=corpconnect,dc=local
      LDAP_BIND_DN: cn=admin,dc=corpconnect,dc=local
      LDAP_BIND_PASSWORD: "CorpConnect_LDAP_Admin!"
    depends_on:
      ldap-waf:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - corpconnect-waf

  ldap-waf:
    build:
      context: ./ldap
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://127.0.0.1:389", "-D", "cn=admin,dc=corpconnect,dc=local", "-w", "CorpConnect_LDAP_Admin!", "-b", "dc=corpconnect,dc=local", "-s", "base", "(objectClass=*)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - corpconnect-waf

networks:
  corpconnect-waf:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24