<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}StaffHub{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e8eef7;
      --muted: #9cb0c8;
      --accent: #3d8bfd;
      --danger: #f4717a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1b2636 0%, var(--bg) 55%);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid #273246;
      background: rgba(21, 29, 41, 0.92);
      backdrop-filter: blur(8px);
    }
    .brand { font-weight: 700; letter-spacing: 0.04em; }
    main { max-width: 880px; margin: 2rem auto; padding: 0 1.25rem; }
    .panel {
      background: var(--panel);
      border: 1px solid #2c3b52;
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    label { display: block; margin-bottom: 0.35rem; color: var(--muted); font-size: 0.9rem; }
    input[type="text"], input[type="password"] {
      width: 100%;
      max-width: 420px;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #3b4d69;
      background: #121a26;
      color: var(--text);
    }
    button, .btn {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3578ea, #265fbf);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover, .btn:hover { filter: brightness(1.06); }
    .error { color: var(--danger); margin-top: 0.5rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    th, td {
      border-bottom: 1px solid #2c3b52;
      padding: 0.65rem 0.5rem;
      text-align: left;
    }
    th { color: var(--muted); font-weight: 600; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
