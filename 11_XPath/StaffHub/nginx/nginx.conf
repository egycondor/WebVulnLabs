worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  upstream staffhub_app {
    server staffhub-web:5000;
  }

  server {
    listen 80;
    server_name _;

    # WAF-style filter only on /api/filtered-search (case-insensitive $args).
    # Blocks substrings: ' or, 1=1, //password, literal |, true()
    location = /api/filtered-search {
      if ($args ~* "(\x27 or|1=1|//password|\||true\(\))") {
        return 403 "Request Blocked";
      }
      proxy_pass http://staffhub_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location / {
      proxy_pass http://staffhub_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
